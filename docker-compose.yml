version: '3.8'

services:
  lucee:
    build: .
    container_name: boyahane_lucee
    ports:
      - "3000:80"
      - "3001:8888"
    environment:
      - LUCEE_ADMIN_PASSWORD=admin123
    volumes:
      - ./:/var/www
      - lucee-config:/opt/lucee/web
    depends_on:
      - postgres
    networks:
      - boyahane-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: boyahane_postgres
    environment:
      - POSTGRES_DB=boyahane
      - POSTGRES_USER=boyahane_user
      - POSTGRES_PASSWORD=boyahane_pass123
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=tr_TR.UTF-8 --lc-ctype=tr_TR.UTF-8
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    networks:
      - boyahane-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boyahane_user -d boyahane"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: boyahane_adminer
    ports:
      - "9090:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - boyahane-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  lucee-config:
    driver: local

networks:
  boyahane-network:
    driver: bridge
