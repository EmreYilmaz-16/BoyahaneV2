upstream tomcat_backend {
  server 127.0.0.1:8888;
  keepalive 32;
}

server {
  listen 80 default_server;
  server_name _;
  index  index.cfm index.html index.htm;
  root   /var/www;
  server_name_in_redirect off;
  client_max_body_size 20m;

  # ===== GÜVENLİK: Hassas dosyalara erişimi engelle =====
  location ~* Application.cf[mc]$ {
    return 404;
  }
  location ~* /Web.cfc$ {
    return 404;
  }
  location ~* /lucee-server {
    return 404;
  }
  location ~* /CFIDE {
    return 404;
  }
  location ~* /lucee/graph.cfm {
    return 404;
  }
  location ~* ^/lucee {
    return 404;
  }
  # Git ve gizli dosyalara erişimi engelle
  location ~ /\. {
    deny all;
  }
  # Docker ve konfigürasyon dosyalarına erişimi engelle
  location ~* \.(yml|yaml|env|ini|log|sql|sh|dockerignore)$ {
    deny all;
  }

  # ===== STATİK DOSYALAR: Nginx doğrudan servis eder =====
  location ~* \.(css|js|map|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|mp4|webm|pdf|zip)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    add_header X-Content-Type-Options nosniff;
    access_log off;
    try_files $uri =404;
  }

  # ===== CFML DOSYALARI: Lucee'ye proxy et =====
  location ~* \.(cfm|cfc)(\/|$) {
    try_files @lucee @lucee;
  }

  # Kök dizin isteği
  location = / {
    try_files @lucee @lucee;
  }

  # Diğer tüm istekler: önce statik dene, yoksa Lucee'ye gönder
  location / {
    try_files $uri $uri/ @lucee;
  }

  location @lucee {
    proxy_pass http://tomcat_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_redirect off;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;
  }
}
